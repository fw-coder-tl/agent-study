server:
  port: 8888
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
spring:
  ai:
    openai:
      api-key: sk-9141ea0811d24340b7f53ac2137a563b
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          maxTokens: 5000

      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/
        api-key: sk-9141ea0811d24340b7f53ac2137a563b
        options:
          model: text-embedding-v4
          dimmension: 1024

  datasource:
    url: jdbc:mysql://127.0.0.1:13306/dodo?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8 # 记得改成你自己的
    username: root # 记得改成你自己的
    password: root123456 # 记得改成你自己的（需与 docker-compose.yml 的 MYSQL_ROOT_PASSWORD 一致）
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 60000
      connection-timeout: 30000
      max-lifetime: 1800000

  # MyBatis-Plus 配置
  mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

